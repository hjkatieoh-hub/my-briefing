name: 데일리 브리핑

on:
  schedule:
    - cron: '0 20 * * 0-4'   # 평일 05:00 KST (일~목 UTC 20:00)
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run (API 미호출)'
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  daily:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - run: pip install -r requirements.txt

      - name: 데일리 브리핑 실행
        env:
          ANTHROPIC_API_KEY:  ${{ secrets.ANTHROPIC_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:   ${{ secrets.TELEGRAM_CHAT_ID }}
          GITHUB_USER:        ${{ github.repository_owner }}
          GITHUB_REPO:        ${{ github.event.repository.name }}
        run: |
          FLAGS=""
          if [ "${{ inputs.dry_run }}" = "true" ]; then FLAGS="--dry-run"; fi
          python main.py daily $FLAGS

      - name: 히스토리 커밋
        run: |
          git config user.name  "briefing-bot"
          git config user.email "briefing-bot@noreply.github.com"
          git add briefings/
          git diff --cached --quiet || git commit -m "daily: $(date '+%Y-%m-%d')"
          git push
