name: 위클리 리포트

on:
  schedule:
    - cron: '5 20 * * 0'    # 매주 월요일 05:05 KST (일요일 UTC 20:05)
  workflow_dispatch:

permissions:
  contents: write

jobs:
  weekly:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - run: pip install -r requirements.txt

      - name: 위클리 리포트 실행
        env:
          ANTHROPIC_API_KEY:  ${{ secrets.ANTHROPIC_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:   ${{ secrets.TELEGRAM_CHAT_ID }}
          GITHUB_USER:        ${{ github.repository_owner }}
          GITHUB_REPO:        ${{ github.event.repository.name }}
        run: python main.py weekly

      - name: 히스토리 커밋
        run: |
          git config user.name  "briefing-bot"
          git config user.email "briefing-bot@noreply.github.com"
          git add briefings/
          git diff --cached --quiet || git commit -m "weekly: $(date '+%Y-%m-%d')"
          git push
